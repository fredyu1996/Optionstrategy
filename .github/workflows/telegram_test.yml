name: Telegram Channel Test

# Manual-only: sends a single test message to verify the Telegram channel
# (same TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID secrets as the alert job).
on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Send test message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import os, sys, requests

          token = os.environ.get("TELEGRAM_BOT_TOKEN")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID")
          if not token or not chat_id:
              print("MISSING SECRET: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is empty")
              sys.exit(1)

          text = "✅ Telegram channel test — if you can read this, alerts are wired up correctly."
          resp = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": text},
              timeout=15,
          )
          print("HTTP", resp.status_code)
          print(resp.text)
          resp.raise_for_status()
          print("OK: test message sent")
          PY
